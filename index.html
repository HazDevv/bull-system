       // ========== INDEXEDDB CONFIGURACION ==========
let db; 

function inicializarDB() {

 // Retorna una promesa para realizar la apertura
 // de la base de datos de forma asíncrona.
    return new Promise((resolve, reject) => {

// Abre la base de datos ToroDB.
// cuando existe una versión anterior.
// 1. Aumentamos la versión a 3 para forzar la actualización en el navegador
        const request = indexedDB.open("ToroDB", 3);

/**
* Se ejecuta cuando la base de datos se crea
 * por primera vez o cuando cambia de versión.
 */
        request.onupgradeneeded = (e) => {
            const dbInstance = e.target.result;

// Crea el almacén de materias si aún no existe.
            if (!dbInstance.objectStoreNames.contains("materias")) {
                dbInstance.createObjectStore("materias", { keyPath: "id", autoIncrement: true });
            }
 // Crea el almacén de lecciones.
            if (!dbInstance.objectStoreNames.contains("lecciones")) {
                const store = dbInstance.createObjectStore("lecciones", { keyPath: "id", autoIncrement: true });

// Índice que permite buscar lecciones
// asociadas a una matrícula.
                store.createIndex("matricula", "matricula", { unique: false });
            }

// Crea el almacén historial para guardar
// los intentos y avances del alumno.
// --- NUEVO: CREAMOS LA TABLA HISTORIAL ---
            if (!dbInstance.objectStoreNames.contains("historial")) {
                const historialStore = dbInstance.createObjectStore("historial", { keyPath: "id", autoIncrement: true });
 

                
// mediante matrícula y título de lección.
// Creamos el índice compuesto que pide tu función obtenerIntentosDB
                historialStore.createIndex("matricula_leccion", ["matricula", "leccionTitulo"], { unique: false });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result; // IMPORTANTE: Sin el 'let' o 'const' para que use la global
// Notifica que la inicialización fue exitosa.
            resolve(db);
        };
 /**
 * Se ejecuta cuando ocurre un error durante
 * la apertura de la base de datos.
 */
// Devuelve el error para su manejo.
        request.onerror = (e) => reject(e.target.error);
    });
}


        // Esta función guarda una lección en IndexedDB para que el usuario pueda acceder a ella offline y no solo es
        // sino que una vez terminada se guarde como terminada y se pueda bloquear el acceso de nuevo para evitar cuestiones 
        // con las calificaciones

        function guardarLeccionDB(matricula, leccion) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['lecciones'], 'readwrite');
        const store = transaction.objectStore('lecciones');

        const data = {
            matricula: matricula,
            // Asociamos la lección a la materia actual que está en sesión
            materia_id: parseInt(sessionStorage.getItem('materia_id_actual')),
            
  
            id_leccion: leccion.id_leccion,
            grupo: leccion.grupo,
            materia: leccion.materia,
            parcial: leccion.parcial,
            progresion: leccion.progresion,
            nombre_leccion: leccion.nombre_leccion,
            titulo_actividad: leccion.titulo_actividad,
            fecha_vencimiento: leccion.fecha_vencimiento,

            // Lo que ya tenías
            titulo: leccion.titulo,
            html: leccion.html,
            respuestasCorrectas: leccion.respuestasCorrectas,

            // ==================================================
           
            // Ahora sí le decimos a la DB que guarde los videos, PDFs y audios
            archivos: leccion.archivos, 
            // ==================================================

            fechaImportacion: new Date().toISOString()
        };

        const request = store.add(data);
        request.onsuccess = () => resolve(request.result);

        // Intercepción de Memoria Llena
        request.onerror = (e) => {
            const errorDB = e.target.error;
            if (errorDB.name === 'QuotaExceededError') {
                reject(new Error("ALMACENAMIENTO_LLENO"));
            } else {
                reject(errorDB);
            }
        };
    });
}
        async function guardarMateria() {
    const nombre = document.getElementById('reg-nombre-materia').value.trim();
    const grupo = document.getElementById('reg-grupo').value.trim();
    const ciclo = document.getElementById('reg-ciclo').value.trim();

    if (!nombre || !grupo || !ciclo) {
        alert("Por favor, rellena todos los campos.");
        return;
    }

    const nuevaMateria = {
        nombre: nombre,
        grupo: grupo,
        ciclo: ciclo,
        color: "#82bda1" // Color por defecto
    };

    try {
        // SEGURIDAD: Si db no existe, esperamos a que se abra
        if (!db) await inicializarDB();

        const transaction = db.transaction(['materias'], 'readwrite');
        const store = transaction.objectStore('materias');
        const request = store.add(nuevaMateria);

        request.onsuccess = () => {
            cerrarModalMateria();
            cargarPantallaMaterias(); // Refrescamos la lista
        };
    } catch (error) {
        console.error("Error al guardar:", error);
    }
}

/**
 * CLASE CRC: ManejadorMateria
 * ESTEREOTIPO: Control
 * MÓDULO: GestionMaterias
 *
 * RESPONSABILIDAD (1): Consultar materias en la base de datos.
 *   Accede al almacén "materias" de IndexedDB en modo solo lectura
 *   y recupera todos los registros almacenados para el alumno.
 *
 * COLABORADOR: Base de datos 
 *
 * RESPONSABILIDAD (2): Devolver la lista de materias obtenida de la base de datos.
 *   Una vez obtenidos los registros, resuelve la promesa con el arreglo
 *   de materias para que puedan mostrarse en la interfaz.
 *
 * COLABORADOR: Base de datos → InterfazMisMaterias
 */
function obtenerMateriasDB() {
    return new Promise((resolve, reject) => {
        if (!db) { // Si por algo no está abierta, intentamos abrirla
            inicializarDB().then(() => ejecutarConsulta());
        } else {
            ejecutarConsulta();
        }

        function ejecutarConsulta() {
            const transaction = db.transaction(['materias'], 'readonly');
            const store = transaction.objectStore(['materias']);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        }
    });
}

async function eliminarMateria(event, idMateria, nombreMateria) {
    // Evita que se abra la materia al hacer clic en el ícono
    event.stopPropagation();

    const confirmar = confirm(`¿Estás seguro de eliminar "${nombreMateria}"?\nSe borrarán permanentemente todas las lecciones asociadas.`);
    
    if (!confirmar) return;

    try {
        if (!db) await inicializarDB();

        // Iniciamos una transacción para ambas tablas
        const transaction = db.transaction(['materias', 'lecciones'], 'readwrite');
        const storeMaterias = transaction.objectStore('materias');
        const storeLecciones = transaction.objectStore('lecciones');

        // 1. Borrar la materia
        storeMaterias.delete(idMateria);

        // 2. Borrar las lecciones asociadas
        // Usamos un cursor para encontrar las que coincidan con el ID de la materia
        const cursorRequest = storeLecciones.openCursor();
        cursorRequest.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                if (cursor.value.materia_id === idMateria) {
                    cursor.delete();
                }
                cursor.continue();
            }
        };

        transaction.oncomplete = () => {
            console.log(`Materia ${idMateria} y sus lecciones eliminadas.`);
            cargarPantallaMaterias(); // Refrescar la vista
        };

    } catch (error) {
        console.error("Error al eliminar materia:", error);
        alert("Hubo un error al intentar eliminar la materia.");
    }
}
        // cargar lecciones de una matrícula
        //Con esto podemos cargar las lecciones que el usuario ha importado previamnete ya que estan asociandas a su matricula
        function cargarLeccionesDB(matricula) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(['lecciones'], 'readonly');
        const store = transaction.objectStore('lecciones');
        const index = store.index('matricula');
        const request = index.getAll(matricula);

        request.onsuccess = () => {
            // Obtenemos el ID de la materia que el alumno seleccionó previamente
            const materiaIdActual = parseInt(sessionStorage.getItem('materia_id_actual'));
            
            // Filtramos los resultados para que solo devuelva las de esta materia
            const leccionesFiltradas = request.result.filter(lec => lec.materia_id === materiaIdActual);
            
            resolve(leccionesFiltradas);
        };
        request.onerror = () => reject(request.error);
    });
}
        //NUEVO: función para buscar una lección por título sin importar la materia, útil para detectar duplicados globales
        // A diferencia de cargarLeccionesDB, esta función NO filtra por materia_id,
        // por lo que detecta duplicados aunque estén en materias distintas.
        function buscarLeccionGlobalDB(matricula, titulo) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['lecciones'], 'readonly');
                const store = transaction.objectStore('lecciones');
                const index = store.index('matricula');
                const request = index.getAll(matricula);
 
                request.onsuccess = () => {
                    // Sin filtro de materia_id: revisamos todas las lecciones del alumno
                    const encontrada = request.result.find(lec => lec.titulo === titulo);
                    resolve(encontrada || null); // Devuelve la lección si existe, o null
                };
                request.onerror = () => reject(request.error);
            });
        }

        // guardar intento de calificación
        function guardarIntentoDB(matricula, leccionTitulo, calificacion) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['historial'], 'readwrite');
                const store = transaction.objectStore('historial');

                const data = {
                    matricula: matricula,
                    leccionTitulo: leccionTitulo,
                    calificacion: calificacion,
                    fecha: new Date().toISOString()
                };

                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // obtener intentos realizados
        function obtenerIntentosDB(matricula, leccionTitulo) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['historial'], 'readonly');
                const store = transaction.objectStore('historial');
                const index = store.index('matricula_leccion');
                const request = index.getAll([matricula, leccionTitulo]);

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

/**
 * CLASE CRC: ManejadorMateria
 * ESTEREOTIPO: Control
 * MÓDULO: GestionMaterias
 *
 * RESPONSABILIDAD (9): Crear materia con los datos en Materia.
 *   Recoge los datos ingresados por el alumno en el formulario modal,
 *   construye el objeto que representa a la entidad Materia y lo persiste
 *   en la base de datos IndexedDB.
 *   Una vez guardado, cierra el modal y refresca la vista de materias.
 *
 * -------------------------------------------------------------------
 * CLASE CRC: Materia
 * ESTEREOTIPO: Entidad
 * MÓDULO: GestionMaterias
 *
 * RESPONSABILIDAD: Representar una materia registrada en el sistema.
 *   El objeto literal "nuevaMateria" actúa como la entidad Materia:
 *   encapsula los atributos nombre, grupo, ciclo, matrícula, color
 *   y fecha de creación que definen a una materia dentro del sistema.
 *
 * RESPONSABILIDAD: Crear materia con los datos provistos por el alumno.
 *   Se instancia con los valores del formulario una vez que el
 *   ManejadorMateria coordina la operación de guardado.
 *
 * COLABORADORES: InterfazMisMaterias (origen del evento), Base de datos (IndexedDB)
 *
 * Nota: No existe una clase JavaScript formal llamada "Materia".
 *       La entidad se representa mediante el objeto literal "nuevaMateria".
 */
async function guardarMateria() {
    const nombre = document.getElementById('reg-nombre-materia').value;
    const grupo = document.getElementById('reg-grupo').value;
    const ciclo = document.getElementById('reg-ciclo').value;
    const matricula = localStorage.getItem('toro_matricula');

    if (!nombre || !grupo || !ciclo) {
        alert("Todos los campos son obligatorios.");
        return;
    }

    const nuevaMateria = {
        nombre: nombre,
        grupo: grupo,
        ciclo: ciclo,
        matricula: matricula,
        color: "#82bda1", // Agregamos un color por defecto
        fecha_creacion: new Date().toISOString()
    };

    // EXPLICACIÓN: Usamos la variable global 'db'. 
    // Si por alguna razón no está lista, la inicializamos.
    if (!db) {

function prepararHTMLConRecursos(htmlOriginal, archivos) {

    `;
    htmlReparado = estiloMovil + htmlReparado;

    Object.keys(archivos).forEach(ruta => {
        if (!window.toro_recursos[ruta]) {
            window.toro_recursos[ruta] = URL.createObjectURL(archivos[ruta]);
        }
        const blobUrl = window.toro_recursos[ruta];
        const nombreArchivo = ruta.split('/').pop();
        htmlReparado = htmlReparado.split('./' + nombreArchivo).join(blobUrl);
        htmlReparado = htmlReparado.split(nombreArchivo).join(blobUrl);
    });
    
    return htmlReparado;

        // permitiendo al usuario revisar el material antes de iniciar la actividad. Además de que las 
        // imagenes se carguen correctamente desde el Zip 

       function verLeccionImportada(index) {
    const leccion = leccionesMemoria[index];
    leccionActual = leccion;

    const contenedor = document.getElementById('lesson-viewer-content');
    
    // 1. Inyectamos el HTML original del profesor (Aquí nace el fantasma)
    let htmlFinal = prepararHTMLConRecursos(leccion.html, leccion.archivos);

    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = htmlFinal;

    // ========================================================
    // 2. ESCÁNER AUTOMÁTICO DE PDFs 
    // ========================================================
    let htmlPdfs = "";
    if (leccion.archivos) {
        Object.keys(leccion.archivos).forEach(ruta => {
            if (ruta.toLowerCase().endsWith('.pdf')) {
                const nombrePdf = ruta.split('/').pop(); 
                let blobUrl = null;

               
                const urlDefectuosa = window.toro_recursos ? window.toro_recursos[ruta] : null;

                // Creamos una nueva URL 100% limpia y forzada como PDF
                if (leccion.archivos[ruta]) {
                    const archivoData = leccion.archivos[ruta];
                    
                    if (archivoData instanceof Blob || archivoData instanceof File) {
                        const pdfBlob = new Blob([archivoData], { type: 'application/pdf' });
                        blobUrl = URL.createObjectURL(pdfBlob);
                    } else if (archivoData instanceof Uint8Array || archivoData instanceof ArrayBuffer) {
                        const pdfBlob = new Blob([archivoData], { type: 'application/pdf' });
                        blobUrl = URL.createObjectURL(pdfBlob);
                    } else if (typeof archivoData === 'string') {
                        if (archivoData.substring(0, 4) === '%PDF') {
                            const bytes = new Uint8Array(archivoData.length);
                            for (let i = 0; i < archivoData.length; i++) {
                                bytes[i] = archivoData.charCodeAt(i) & 0xff;
                            }
                            const pdfBlob = new Blob([bytes], { type: 'application/pdf' });
                            blobUrl = URL.createObjectURL(pdfBlob);
                        } else {
                            blobUrl = archivoData.startsWith('data:') ? archivoData : 'data:application/pdf;base64,' + archivoData;
                            blobUrl = blobUrl.replace(/data:.*?;/, 'data:application/pdf;');
                        }
                    }
                }

                // Si por alguna razón extrema no pudimos crear la nueva, usamos la vieja
                if (!blobUrl) blobUrl = urlDefectuosa;

                
                const posiblesFantasmas = tempDiv.querySelectorAll('iframe, embed, object');
                posiblesFantasmas.forEach(el => {
                    const src = el.src || el.data || el.getAttribute('src') || el.getAttribute('data') || "";
                    
                    
                    if (src.includes(nombrePdf) || src === blobUrl || (urlDefectuosa && src === urlDefectuosa)) {
                        el.remove();
                    }
                });
                
               
                if (blobUrl) {
                    htmlPdfs += `
                        <div class="recurso-pdf" style="margin-top: 30px; padding: 15px; background: #f1f3f5; border-radius: 12px; border: 1px solid #e0e4e8;">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                                <span style="font-size: 1.5rem;">📄</span>
                                <strong style="color: var(--dark-green);">${nombrePdf}</strong>
                            </div>
                            
                            <iframe src="${blobUrl}" class="pdf-viewer-frame" style="width: 100%; height: 500px; border: none; border-radius: 8px; background: white;"></iframe>
                            
                            <div style="margin-top: 15px; text-align: right;">
                                <a href="${blobUrl}" target="_blank" class="btn-toro" style="display: inline-block; width: auto; padding: 8px 15px; font-size: 14px; text-decoration: none;">
                                    Abrir en pantalla completa
                                </a>
                            </div>
                        </div>
                    `;
                }
            }
        });
    }

    
    contenedor.innerHTML = tempDiv.innerHTML + htmlPdfs;

   
    document.getElementById('lesson-modal').style.display = 'flex';
}

                const observer = new MutationObserver((mutations) => {
                    mutations.forEach(m => {

                        // Si el otro equipo le añade la clase "wrong" (error)
                        if (m.attributeName === 'class' && el.classList.contains('wrong')) {

            const cuerpoOfuscado = ofuscarReporte(cuerpo);
            const nombreArchivo = `REP_${leccionActual.id_leccion}_${mat}_${nombre}.toro`;
            descargarArchivoTxt(cuerpoOfuscado, nombreArchivo); 
            
            modal.style.display = 'none';
            
            leccionesMemoria = await cargarLeccionesDB(mat);
            await renderizarLecciones();
                    };
                }
}

async function obtenerLeccionPorId(id) {
    return new Promise((resolve) => {
        const transaction = db.transaction(['lecciones'], 'readonly');
        const store = transaction.objectStore('lecciones');
        const request = store.get(id);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => resolve(null);
    });
}
        
       // ========== PROCESAMIENTO ZIP ==========
async function procesarHTML() {
    const input = document.getElementById('fileInput');
    if (!input.files[0]) return;

    try {
        const matricula = localStorage.getItem('toro_matricula');
        const file = input.files[0];
        const tituloNuevo = file.name.replace('.zip', '');

        // --- Excepcion 2.1 Prevención de OOM (Out Of Memory) ---
        // Definimos un límite seguro para teléfonos de gama de entrada (35 MB)
        const limiteMB = 700;
        const maxSize = limiteMB * 1024 * 1024;
        
        if (file.size > maxSize) {
            alert(`El archivo "${file.name}" es demasiado pesado (${(file.size / 1024 / 1024).toFixed(1)} MB).\n\nEl límite máximo permitido es de ${limiteMB} MB para evitar que el sistema colapse en tu celular. Pide al profesor una versión más ligera.`);
            input.value = '';
            document.getElementById('file-status').innerText = 'Ningún archivo seleccionado';
            return;
        }
        // ----------------------------------------------------------
        //  NUEVO: Buscamos el título en TODAS las materias del alumno, no solo la actual 
        // Si la función encuentra una coincidencia, devuelve el objeto lección con su materia_id.
        // Si no encuentra nada, devuelve null y el alumno puede continuar.
        const leccionDuplicada = await buscarLeccionGlobalDB(matricula, tituloNuevo);
 
        if (leccionDuplicada) {
            //  NUEVO: Buscamos el nombre de la materia donde ya existe para el mensaje 
            // Abrimos una transacción de solo lectura sobre "materias" y buscamos por el ID guardado.
            const transaction = db.transaction(['materias'], 'readonly');
            const store = transaction.objectStore('materias');
            const reqMateria = store.get(leccionDuplicada.materia_id);
 
            reqMateria.onsuccess = () => {
                const nombreMateria = reqMateria.result?.nombre || 'otra materia';
                alert(`La lección "${tituloNuevo}" ya fue importada en "${nombreMateria}".\nNo puedes importar la misma lección en dos materias diferentes.`);
            };
            reqMateria.onerror = () => {
                alert(`La lección "${tituloNuevo}" ya existe en otra materia. No puedes importarla de nuevo.`);
            };
 
            input.value = '';
            document.getElementById('file-status').innerText = 'Ningún archivo seleccionado';
            document.getElementById('file-status').style.color = '#888';
            return;
        }
            // ----------------------------------------------------------
        const arrayBuffer = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(arrayBuffer);

        let htmlOriginal = "";
        let rutaHtml = "";
        let intentosTxt = 3;
        let respuestasTxt = [];

        // Variables nuevas para los 8 campos requeridos
        let id_leccion = "", grupo = "", materia = "", parcial = "", 
            progresion = "", nombre_leccion = "", titulo_actividad = "", fecha_vencimiento = "";

        // ---- NUEVO: Creamos un almacén para los archivos físicos ----
       let archivosBlobs = {}; 
        const promesas = [];

        zip.forEach((rutaCompleta, entry) => {
            if (!entry.dir) {
                const p = entry.async("blob").then(async blob => {

                    let blobFinal = blob;
                    
                    
                    archivosBlobs[rutaCompleta] = blobFinal; // GUARDAMOS EL ARCHIVO REAL
                    window.toro_recursos[rutaCompleta] = URL.createObjectURL(blobFinal);
                    
                    // Aseguramos que lea el txt sin importar si está en mayúsculas (.TXT)
                    if (rutaCompleta.toLowerCase().endsWith('.txt')) {
                        // Usamos blobFinal por buena práctica
                        const texto = await blobFinal.text(); 
                        
                        // Función interna para extraer valores del TXT
                        const extraer = (campo) => {
                            const regex = new RegExp(`${campo}:\\s*(.*)`, "i");
                            const match = texto.match(regex);
                            return match ? match[1].trim() : "No especificado";
                        };

                        // Extraer los 8 campos obligatorios
                        id_leccion = extraer("ID_LECCION");
                        grupo = extraer("GRUPO");
                        materia = extraer("MATERIA");
                        parcial = extraer("PARCIAL");
                        progresion = extraer("TEMA");
                        nombre_leccion = extraer("TITULO");
                        titulo_actividad = extraer("NOMBRE_ACTIVIDAD");
                        fecha_vencimiento = extraer("FECHA_VENCIMIENTO");

                        // Lógica original de intentos y respuestas
                        // Lógica original de intentos y respuestas compatible con Verdadero/Falso
                        const mInt = texto.match(/INTENTOS_MAX:\s*(\d+)/);
                        if (mInt) intentosTxt = parseInt(mInt[1]);

                        // NUEVO: Busca "RESPUESTA:" o "RESPUESTA_CORRECTA:"
                        const mResp = [...texto.matchAll(/(?:RESPUESTA|RESPUESTA_CORRECTA):\s*(.+)/gi)];
                        respuestasTxt = mResp.map(m => m[1].trim());
                    }
                });
                promesas.push(p);
                
                // También le ponemos toLowerCase al HTML por si acaso
                if (rutaCompleta.toLowerCase().endsWith('.html')) rutaHtml = rutaCompleta;
            }
        });

        await Promise.all(promesas);
        htmlOriginal = await zip.file(rutaHtml).async("string");
        

        // Construcción del objeto leccionNueva con los parámetros técnicos y los del cl                        iente
        const leccionNueva = {
            // Campos originales preservados
            titulo: tituloNuevo,
            html: htmlOriginal,
            rutaBase: rutaHtml.substring(0, rutaHtml.lastIndexOf('/') + 1),
            intentosMax: intentosTxt,
            respuestasCorrectas: respuestasTxt,

            // NUEVO: Agregamos el almacén a la base de datos
            archivos: archivosBlobs, 

            // Los 8 campos nuevos integrados
            id_leccion: id_leccion,
            grupo: grupo,
            materia: materia,
            parcial: parcial,
            progresion: progresion,
            nombre_leccion: nombre_leccion,
            titulo_actividad: titulo_actividad,
            fecha_vencimiento: fecha_vencimiento
        };

        // Guardar en IndexedDB usando tu función original (que ya sabe manejar estos campos)
        await guardarLeccionDB(matricula, leccionNueva);

        // Recargar lecciones una vez mas
        leccionesMemoria = await cargarLeccionesDB(matricula);
        renderizarLecciones();

        alert(` Importado: ${leccionNueva.titulo}`);

        // Limpiar input del selector
        input.value = '';
        document.getElementById('file-status').innerText = 'Ningún archivo seleccionado';
        document.getElementById('file-status').style.color = '#888';

    } catch (e) {
        console.error("Error exacto capturado:", e);
        
        // Limpiamos el input para que pueda intentar de nuevo
        document.getElementById('fileInput').value = '';
        document.getElementById('file-status').innerText = 'Ningún archivo seleccionado';
        document.getElementById('file-status').style.color = '#888';
        
        // Manejo de excepciones para el usuario final
        if (e.message === "ALMACENAMIENTO_LLENO"|| e.name === "QuotaExceededError") {
            alert("¡Tu celular no tiene espacio suficiente!\n\nNo pudimos guardar la lección. Por favor, libera espacio y vuelve a intentarlo.");
        } else {
            // Error genérico para archivos corruptos o truncados (ECONNRESET)
            alert("Ocurrió un error al intentar abrir el archivo ZIP.\n\nEs posible que la descarga se haya interrumpido o el archivo esté dañado. Vuelve a descargarlo del profesor.");
        }
    }
}

        // ========== UTILIDADES ==========

        
        function ofuscarReporte(texto) {
    // NUEVO PASO: Calculamos la firma matemática (longitud del texto * 77)
    const firma = (texto.length * 77).toString();
    
    // NUEVO PASO: Unimos el texto del reporte y la firma con el delimitador "||"
    const textoConFirma = texto + "||" + firma;

    // Paso 1: Aplicamos la rotación de caracteres (+3) a toda la cadena unida (texto + firma)
    const textoModificado = textoConFirma.split('').map(char => 
        String.fromCharCode(char.charCodeAt(0) + 3) 
    ).join('');
    
    // Paso 2: Convertir a Base64 asegurando la compatibilidad de acentos
    return btoa(unescape(encodeURIComponent(textoModificado)));
}
        
        function descargarArchivoTxt(contenido, nombreArchivo) {
            const elemento = document.createElement('a');
            const archivo = new Blob([contenido], { type: 'text/plain' });
            elemento.href = URL.createObjectURL(archivo);
            elemento.download = nombreArchivo;
            document.body.appendChild(elemento);
            elemento.click();
            document.body.removeChild(elemento);
        }
